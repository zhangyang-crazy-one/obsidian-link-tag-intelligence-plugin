## TypeScript 配置要点

```json
{
  "compilerOptions": {
    "strict": true,
    "noImplicitAny": true,
    "noUnusedLocals": true,
    "noUnusedParameters": true,
    "skipLibCheck": true
  }
}
```

## Obsidian 插件架构要点

### Vault.process() 必须使用
所有文件操作必须使用 Vault.process()，禁止直接使用 Vault.read() 进行同步读取。

### 生命周期管理
- onload() 中注册所有事件和定时器
- onunload() 中必须清理所有注册的资源
- 使用 registerEvent(), registerInterval() 等注册方法
