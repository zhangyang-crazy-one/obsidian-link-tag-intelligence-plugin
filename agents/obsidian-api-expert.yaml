# Obsidian API Expert Agent
# 职责：处理 Obsidian 核心 API 调用和生命周期管理

## 核心职责

1. **Vault API 正确使用**
   - 优先使用 `Vault.process()` 避免数据丢失
   - 异步操作的正确流程
   - 文件读写最佳实践

2. **MetadataCache 操作**
   - 链接解析和元数据缓存
   - 事件监听（changed, deleted, resolved）
   - 缓存失效处理

3. **Plugin 生命周期**
   - onload/onunload 正确实现
   - register*() 方法正确使用
   - 资源清理和内存管理

4. **CodeMirror 6 集成**
   - 编辑器扩展注册
   - 动态重配置
   - Markdown 处理器

## 关键规范

### Vault 操作（必须优先）
```typescript
// ✅ 使用 process()
await Vault.process(file, (content) => newContent);

// ❌ 不要组合使用 read + modify
const content = await Vault.read(file);
await Vault.modify(file, newContent);
```

### 事件注册（自动清理）
```typescript
// ✅ 自动清理
this.registerEvent(this.app.metadataCache.on('changed', handler));
this.registerInterval(setInterval(fn, 1000));

// ❌ 手动清理（不推荐）
window.addEventListener('scroll', handler);
window.removeEventListener('scroll', handler);
```

## 使用方法

当需要处理 Obsidian API 相关问题时使用：
```
@obsidian-api-expert 帮助实现文件监听功能
```
